log_level = "ashell=debug"
language = "es-CO"
region = "es-CO"
outputs = "All"
position = "Top"
enable_esc_key = true

[workspaces]
visibility_mode = "MonitorSpecific"

[modules]
left = [ "Laucher", "Workspaces" ]
center = [ "WindowTitle" ]
right = [ "SystemInfo", ["Tray", "MediaPlayer", "Notifications", "Tempo", "Privacy", "Settings" ] ]

[media_player]
max_title_length = 50
indicator_format = "Icon"

[[CustomModule]]
name = "Laucher"
type = "Button"
icon = ""
command = "nwg-drawer"

[notifications]
format = "%m/%d %H:%M"
show_timestamps = true
show_bodies = false
grouped = true
toast = true
toast_position = "top_right"
toast_timeout = 4000
toast_limit = 5
toast_max_height = 150

[appearance]
success_color = "#a3be8c"
warning_color = "#ebcb8b"
danger_color = "#bf616a"
text_color = "#eceff4"
workspace_colors = [ "#88c0d0", "#81a1c1", "#5e81ac" ]

[appearance.primary_color]
base = "#88c0d0"
text = "#242933"
icon = "#1793d1"

[appearance.background_color]
base = "#3b4252"
weak = "#434c5e"
strong = "#4c566a"
