general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = hyprlock
}

listener {
    # 600 seconds = 10 minutes
    timeout = 600
    on-timeout = hyprlock
}

listener {
    # 900 seconds = 15 minutes
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
